<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Feedback — JobHound</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 24px;
            padding-bottom: 48px;
        }
        .container { max-width: 600px; padding-left: 16px; padding-right: 16px; }
        .jh-header { text-align: center; margin-bottom: 24px; }
        .jh-header .icon { font-size: 2rem; display: block; margin-bottom: 8px; }
        .jh-header h1 { font-weight: 800; font-size: clamp(1.3rem, 5vw, 1.8rem); margin: 0; }
        .jh-header .back { font-size: 0.88rem; margin-top: 6px; }
        .form-control, .form-select { font-size: 16px; }
        .form-label { font-weight: 600; margin-bottom: 0.3rem; }
        .btn-submit { width: 100%; padding: 0.7rem; font-size: 1rem; font-weight: 600; }
        @media (min-width: 576px) { .btn-submit { width: auto; } }

        .star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 6px; }
        .star-rating input { display: none; }
        .star-rating label {
            font-size: 2rem;
            color: #dee2e6;
            cursor: pointer;
            transition: color 0.1s;
            line-height: 1;
        }
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ffc107;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="jh-header">
        <span class="icon">🐾</span>
        <h1>Share Your Feedback</h1>
        <div class="back"><a href="/" class="text-muted">← Back to JobHound</a></div>
    </div>

    {% if submitted %}
    <div class="alert alert-success text-center" role="alert">
        <strong>Thanks for your feedback!</strong> It helps make JobHound better.
        <div class="mt-2"><a href="/" class="btn btn-success btn-sm">Analyse another job</a></div>
    </div>
    {% else %}

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form method="POST" action="/feedback" novalidate>

                <div class="mb-4">
                    <label class="form-label">How would you rate JobHound?</label>
                    <div class="star-rating">
                        <input type="radio" name="rating" id="star5" value="5">
                        <label for="star5" title="5 stars">★</label>
                        <input type="radio" name="rating" id="star4" value="4">
                        <label for="star4" title="4 stars">★</label>
                        <input type="radio" name="rating" id="star3" value="3">
                        <label for="star3" title="3 stars">★</label>
                        <input type="radio" name="rating" id="star2" value="2">
                        <label for="star2" title="2 stars">★</label>
                        <input type="radio" name="rating" id="star1" value="1">
                        <label for="star1" title="1 star">★</label>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="category" class="form-label">What's this about?</label>
                    <select class="form-select" id="category" name="category">
                        <option value="">— Pick one (optional)</option>
                        <option value="summary_quality">Summary quality</option>
                        <option value="site_support">Site / URL support</option>
                        <option value="linkedin_cookie">LinkedIn session cookie</option>
                        <option value="speed">Speed</option>
                        <option value="ui">Design / ease of use</option>
                        <option value="bug">Bug report</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="message" class="form-label">Your feedback <span class="text-muted fw-normal">(required)</span></label>
                    <textarea
                        class="form-control"
                        id="message"
                        name="message"
                        rows="4"
                        placeholder="Tell us what worked, what didn't, or what you'd love to see..."
                        required
                    ></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-submit">Send Feedback</button>
            </form>
        </div>
    </div>
    {% endif %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<footer class="text-center mt-5 pb-3" style="font-size:0.82rem; color:#adb5bd;">
    <a href="/feedback" class="text-muted">Leave feedback</a>
    <span class="mx-2">·</span>
    <span>Built by <strong style="color:#6c757d;">Anjaneya Sharma</strong>, <strong style="color:#6c757d;">Javier</strong> &amp; <strong style="color:#6c757d;">Ethan Wong</strong></span>
</footer>
</body>
</html>
